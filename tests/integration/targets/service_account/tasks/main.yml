- name: remove temp service account
  service_account:
    name: MySA
    state: absent

- name: create KDS root key if not present
  microsoft.ad.kds_root_key:
    effective_time_hours: 0
  become: true
  become_method: runas
  become_user: SYSTEM

- block:
    - import_tasks: tests.yml

  always:
    - name: remove temp service account
      service_account:
        name: MySA
        identity: "{{ object_identity | default(omit) }}"
        state: absent
