---
- name: site -- comprehensive manual test scenarios
  hosts: windows
  gather_facts: false

  tasks:
    # =====================================================================
    #  1. ERROR CASES
    # =====================================================================
    - name: "ERR-1: Remove non-existent site (should not fail, no change)"
      microsoft.ad.site:
        name: SiteThatNeverExisted99
        state: absent
      register: _err_remove_missing

    - name: Assert ERR-1 is not changed and not failed
      ansible.builtin.assert:
        that:
          - _err_remove_missing is not changed
          - _err_remove_missing is not failed

    - name: "ERR-2: Invalid state value (should fail validation)"
      microsoft.ad.site:
        name: ErrBadState
        state: invalid_state
      register: _err_bad_state
      ignore_errors: true

    - name: Assert ERR-2 failed with choices error
      ansible.builtin.assert:
        that:
          - _err_bad_state is failed

    - name: "ERR-3: managed_by with non-existent DN (should fail on create)"
      microsoft.ad.site:
        name: ErrBadManagedBy
        managed_by: "CN=NonExistentUser,DC=ansible,DC=test"
        state: present
      register: _err_bad_dn
      ignore_errors: true

    - name: Assert ERR-3 failed
      ansible.builtin.assert:
        that:
          - _err_bad_dn is failed

    - name: Cleanup ERR-3 site in case it was partially created
      microsoft.ad.site:
        name: ErrBadManagedBy
        state: absent
      ignore_errors: true

    # =====================================================================
    #  2. CREATE -- minimal (name only)
    # =====================================================================
    - name: "CREATE-1: Check mode -- minimal create"
      microsoft.ad.site:
        name: TestMinimalSite
        state: present
      register: _create_min_check
      check_mode: true

    - name: Assert check mode reports changed
      ansible.builtin.assert:
        that:
          - _create_min_check is changed

    - name: Verify site was NOT created in check mode
      ansible.windows.win_powershell:
        script: |
          try {
              $s = Get-ADReplicationSite -Identity 'TestMinimalSite'
              $Ansible.Result = $true
          }
          catch [Microsoft.ActiveDirectory.Management.ADIdentityNotFoundException] {
              $Ansible.Result = $false
          }
      register: _min_check_verify

    - name: Assert not created
      ansible.builtin.assert:
        that:
          - not _min_check_verify.result

    - name: "CREATE-2: Actually create minimal site"
      microsoft.ad.site:
        name: TestMinimalSite
        state: present
      register: _create_min

    - name: Assert created
      ansible.builtin.assert:
        that:
          - _create_min is changed
          - _create_min.distinguished_name is defined
          - _create_min.distinguished_name | length > 0
          - _create_min.object_guid is defined

    - name: "CREATE-3: Minimal idempotency"
      microsoft.ad.site:
        name: TestMinimalSite
        state: present
      register: _create_min_idem

    - name: Assert no change
      ansible.builtin.assert:
        that:
          - _create_min_idem is not changed

    # =====================================================================
    #  3. CREATE -- with description
    # =====================================================================
    - name: "CREATE-4: Create site with description"
      microsoft.ad.site:
        name: TestDescSite
        description: London branch office
        state: present
      register: _create_desc

    - name: Assert created with description
      ansible.builtin.assert:
        that:
          - _create_desc is changed
          - _create_desc.object_guid is defined

    - name: "CREATE-5: Description idempotency"
      microsoft.ad.site:
        name: TestDescSite
        description: London branch office
        state: present
      register: _create_desc_idem

    - name: Assert no change
      ansible.builtin.assert:
        that:
          - _create_desc_idem is not changed

    # =====================================================================
    #  4. CREATE -- with all optional properties
    # =====================================================================
    - name: "CREATE-6: Full properties at creation"
      microsoft.ad.site:
        name: TestFullSite
        description: Full property test site
        protect_from_deletion: false
        automatic_inter_site_topology_generation_enabled: true
        automatic_topology_generation_enabled: true
        universal_group_caching_enabled: true
        state: present
      register: _create_full

    - name: Assert full site created
      ansible.builtin.assert:
        that:
          - _create_full is changed

    - name: Verify all properties were set correctly
      ansible.windows.win_powershell:
        script: |
          $s = Get-ADReplicationSite -Identity 'TestFullSite' -Properties `
              Description, ProtectedFromAccidentalDeletion, `
              AutomaticInterSiteTopologyGenerationEnabled, `
              AutomaticTopologyGenerationEnabled, UniversalGroupCachingEnabled
          $Ansible.Result = @{
              description = $s.Description
              protected = $s.ProtectedFromAccidentalDeletion
              inter_site = $s.AutomaticInterSiteTopologyGenerationEnabled
              intra_site = $s.AutomaticTopologyGenerationEnabled
              ugc = $s.UniversalGroupCachingEnabled
          }
      register: _full_verify

    - name: Assert all properties match
      ansible.builtin.assert:
        that:
          - _full_verify.result.description == 'Full property test site'
          - _full_verify.result.protected == false
          - _full_verify.result.inter_site == true
          - _full_verify.result.intra_site == true
          - _full_verify.result.ugc == true

    - name: "CREATE-7: Full properties idempotency"
      microsoft.ad.site:
        name: TestFullSite
        description: Full property test site
        protect_from_deletion: false
        automatic_inter_site_topology_generation_enabled: true
        automatic_topology_generation_enabled: true
        universal_group_caching_enabled: true
        state: present
      register: _create_full_idem

    - name: Assert no change
      ansible.builtin.assert:
        that:
          - _create_full_idem is not changed

    # =====================================================================
    #  5. CREATE -- with protection enabled
    # =====================================================================
    - name: "CREATE-8: Create protected site"
      microsoft.ad.site:
        name: TestProtectedSite
        description: Protected site
        protect_from_deletion: true
        state: present
      register: _create_protected

    - name: Assert protected site created
      ansible.builtin.assert:
        that:
          - _create_protected is changed

    - name: Verify protection flag is set
      ansible.windows.win_powershell:
        script: |
          $s = Get-ADReplicationSite -Identity 'TestProtectedSite' -Properties ProtectedFromAccidentalDeletion
          $Ansible.Result = $s.ProtectedFromAccidentalDeletion
      register: _protect_verify

    - name: Assert protection is true
      ansible.builtin.assert:
        that:
          - _protect_verify.result == true

    # =====================================================================
    #  6. UPDATE -- individual properties
    # =====================================================================
    - name: "UPDATE-1: Change description"
      microsoft.ad.site:
        name: TestDescSite
        description: Updated London branch
        state: present
      register: _update_desc

    - name: Assert description changed
      ansible.builtin.assert:
        that:
          - _update_desc is changed

    - name: "UPDATE-2: Description idempotency"
      microsoft.ad.site:
        name: TestDescSite
        description: Updated London branch
        state: present
      register: _update_desc_idem

    - name: Assert no change
      ansible.builtin.assert:
        that:
          - _update_desc_idem is not changed

    - name: "UPDATE-3: Enable universal group caching"
      microsoft.ad.site:
        name: TestDescSite
        universal_group_caching_enabled: true
        state: present
      register: _update_ugc

    - name: Assert UGC changed
      ansible.builtin.assert:
        that:
          - _update_ugc is changed

    - name: "UPDATE-4: UGC idempotency"
      microsoft.ad.site:
        name: TestDescSite
        universal_group_caching_enabled: true
        state: present
      register: _update_ugc_idem

    - name: Assert no change
      ansible.builtin.assert:
        that:
          - _update_ugc_idem is not changed

    - name: "UPDATE-5: Disable automatic inter-site topology"
      microsoft.ad.site:
        name: TestDescSite
        automatic_inter_site_topology_generation_enabled: false
        state: present
      register: _update_istg

    - name: Assert ISTG changed
      ansible.builtin.assert:
        that:
          - _update_istg is changed

    - name: "UPDATE-6: ISTG idempotency"
      microsoft.ad.site:
        name: TestDescSite
        automatic_inter_site_topology_generation_enabled: false
        state: present
      register: _update_istg_idem

    - name: Assert no change
      ansible.builtin.assert:
        that:
          - _update_istg_idem is not changed

    - name: "UPDATE-7: Re-enable ISTG"
      microsoft.ad.site:
        name: TestDescSite
        automatic_inter_site_topology_generation_enabled: true
        state: present
      register: _update_istg_back

    - name: Assert ISTG re-enabled
      ansible.builtin.assert:
        that:
          - _update_istg_back is changed

    - name: "UPDATE-8: Disable automatic intra-site topology"
      microsoft.ad.site:
        name: TestDescSite
        automatic_topology_generation_enabled: false
        state: present
      register: _update_kcc

    - name: Assert KCC changed
      ansible.builtin.assert:
        that:
          - _update_kcc is changed

    - name: "UPDATE-9: KCC idempotency"
      microsoft.ad.site:
        name: TestDescSite
        automatic_topology_generation_enabled: false
        state: present
      register: _update_kcc_idem

    - name: Assert no change
      ansible.builtin.assert:
        that:
          - _update_kcc_idem is not changed

    - name: "UPDATE-10: Toggle protection on then off"
      microsoft.ad.site:
        name: TestMinimalSite
        protect_from_deletion: true
        state: present
      register: _update_prot_on

    - name: Assert protection enabled
      ansible.builtin.assert:
        that:
          - _update_prot_on is changed

    - name: "UPDATE-11: Protection on idempotency"
      microsoft.ad.site:
        name: TestMinimalSite
        protect_from_deletion: true
        state: present
      register: _update_prot_on_idem

    - name: Assert no change
      ansible.builtin.assert:
        that:
          - _update_prot_on_idem is not changed

    - name: "UPDATE-12: Disable protection"
      microsoft.ad.site:
        name: TestMinimalSite
        protect_from_deletion: false
        state: present
      register: _update_prot_off

    - name: Assert protection disabled
      ansible.builtin.assert:
        that:
          - _update_prot_off is changed

    - name: "UPDATE-13: Multiple properties at once"
      microsoft.ad.site:
        name: TestMinimalSite
        description: Now has a description
        universal_group_caching_enabled: true
        automatic_inter_site_topology_generation_enabled: false
        state: present
      register: _update_multi

    - name: Assert multiple changes
      ansible.builtin.assert:
        that:
          - _update_multi is changed

    - name: "UPDATE-14: Multiple properties idempotency"
      microsoft.ad.site:
        name: TestMinimalSite
        description: Now has a description
        universal_group_caching_enabled: true
        automatic_inter_site_topology_generation_enabled: false
        state: present
      register: _update_multi_idem

    - name: Assert no change
      ansible.builtin.assert:
        that:
          - _update_multi_idem is not changed

    # =====================================================================
    #  7. CHECK MODE on update
    # =====================================================================
    - name: "CHECK-1: Check mode update (should not persist)"
      microsoft.ad.site:
        name: TestDescSite
        description: This should NOT persist
        state: present
      register: _check_update
      check_mode: true

    - name: Assert check mode reports changed
      ansible.builtin.assert:
        that:
          - _check_update is changed

    - name: Verify description was NOT changed by check mode
      ansible.windows.win_powershell:
        script: |
          $s = Get-ADReplicationSite -Identity 'TestDescSite' -Properties Description
          $Ansible.Result = $s.Description
      register: _check_desc_verify

    - name: Assert description unchanged
      ansible.builtin.assert:
        that:
          - _check_desc_verify.result == 'Updated London branch'

    - name: "CHECK-2: No updatable params -- should be no change"
      microsoft.ad.site:
        name: TestDescSite
        state: present
      register: _update_noop

    - name: Assert no change
      ansible.builtin.assert:
        that:
          - _update_noop is not changed

    # =====================================================================
    #  8. DIFF MODE verification
    # =====================================================================
    - name: "DIFF-1: Create new site with diff"
      microsoft.ad.site:
        name: TestDiffSite
        description: Diff test
        state: present
      register: _diff_create
      diff: true

    - name: Assert diff after has expected keys on create
      ansible.builtin.assert:
        that:
          - _diff_create is changed
          - _diff_create.diff.before is none
          - _diff_create.diff.after.name == 'TestDiffSite'
          - _diff_create.diff.after.description == 'Diff test'

    - name: "DIFF-2: Update with diff"
      microsoft.ad.site:
        name: TestDiffSite
        description: Diff updated
        state: present
      register: _diff_update
      diff: true

    - name: Assert diff shows before and after
      ansible.builtin.assert:
        that:
          - _diff_update is changed
          - _diff_update.diff.before.description == 'Diff test'
          - _diff_update.diff.after.description == 'Diff updated'

    - name: "DIFF-3: Remove with diff"
      microsoft.ad.site:
        name: TestDiffSite
        state: absent
      register: _diff_remove
      diff: true

    - name: Assert diff shows before populated and after null
      ansible.builtin.assert:
        that:
          - _diff_remove is changed
          - _diff_remove.diff.before.name == 'TestDiffSite'
          - _diff_remove.diff.after is none

    # =====================================================================
    #  9. REMOVE -- check mode and actual
    # =====================================================================
    - name: "DEL-1: Remove TestDescSite check mode"
      microsoft.ad.site:
        name: TestDescSite
        state: absent
      register: _del_check
      check_mode: true

    - name: Assert check mode remove reports changed
      ansible.builtin.assert:
        that:
          - _del_check is changed

    - name: Verify site still exists after check mode
      ansible.windows.win_powershell:
        script: |
          try {
              $s = Get-ADReplicationSite -Identity 'TestDescSite'
              $Ansible.Result = $true
          }
          catch [Microsoft.ActiveDirectory.Management.ADIdentityNotFoundException] {
              $Ansible.Result = $false
          }
      register: _del_check_verify

    - name: Assert still exists
      ansible.builtin.assert:
        that:
          - _del_check_verify.result

    - name: "DEL-2: Actually remove TestDescSite"
      microsoft.ad.site:
        name: TestDescSite
        state: absent
      register: _del_actual

    - name: Assert removed
      ansible.builtin.assert:
        that:
          - _del_actual is changed

    - name: "DEL-3: Remove again (idempotency)"
      microsoft.ad.site:
        name: TestDescSite
        state: absent
      register: _del_idem

    - name: Assert no change
      ansible.builtin.assert:
        that:
          - _del_idem is not changed

    - name: "DEL-4: Remove TestProtectedSite (framework handles protection)"
      microsoft.ad.site:
        name: TestProtectedSite
        state: absent
      register: _del_protected

    - name: Assert protected site removed
      ansible.builtin.assert:
        that:
          - _del_protected is changed

    - name: "DEL-5: Remove TestProtectedSite again (idempotency)"
      microsoft.ad.site:
        name: TestProtectedSite
        state: absent
      register: _del_protected_idem

    - name: Assert no change
      ansible.builtin.assert:
        that:
          - _del_protected_idem is not changed

    # =====================================================================
    #  10. EDGE CASES
    # =====================================================================
    - name: "EDGE-1: Create site with hyphenated name"
      microsoft.ad.site:
        name: Test-Hyphen-Site
        description: Hyphenated name test
        state: present
      register: _edge_hyphen

    - name: Assert hyphenated site created
      ansible.builtin.assert:
        that:
          - _edge_hyphen is changed
          - _edge_hyphen.object_guid is defined

    - name: "EDGE-2: Create and immediately re-create (rapid idempotency)"
      microsoft.ad.site:
        name: TestRapidSite
        description: Rapid test
        state: present
      register: _edge_rapid1

    - name: Immediately re-run
      microsoft.ad.site:
        name: TestRapidSite
        description: Rapid test
        state: present
      register: _edge_rapid2

    - name: Assert first is changed, second is not
      ansible.builtin.assert:
        that:
          - _edge_rapid1 is changed
          - _edge_rapid2 is not changed

    - name: "EDGE-3: Remove protected site directly (framework handles protection)"
      block:
        - name: Create protected site
          microsoft.ad.site:
            name: TestLifecycleSite
            description: Lifecycle test
            protect_from_deletion: true
            state: present

        - name: Remove protected site directly
          microsoft.ad.site:
            name: TestLifecycleSite
            state: absent
          register: _edge_lifecycle_del

        - name: Assert removed
          ansible.builtin.assert:
            that:
              - _edge_lifecycle_del is changed
      always:
        - name: Cleanup - remove TestLifecycleSite
          microsoft.ad.site:
            name: TestLifecycleSite
            state: absent
          ignore_errors: true

    - name: "EDGE-4: Update only one bool, leave others untouched"
      block:
        - name: Set UGC on TestFullSite (already true from CREATE-6)
          microsoft.ad.site:
            name: TestFullSite
            universal_group_caching_enabled: true
            state: present
          register: _edge_partial

        - name: Assert no change (was already true)
          ansible.builtin.assert:
            that:
              - _edge_partial is not changed

        - name: Verify other properties unchanged
          ansible.windows.win_powershell:
            script: |
              $s = Get-ADReplicationSite -Identity 'TestFullSite' -Properties `
                  Description, AutomaticInterSiteTopologyGenerationEnabled, `
                  AutomaticTopologyGenerationEnabled
              $Ansible.Result = @{
                  description = $s.Description
                  inter_site = $s.AutomaticInterSiteTopologyGenerationEnabled
                  intra_site = $s.AutomaticTopologyGenerationEnabled
              }
          register: _edge_partial_verify

        - name: Assert other properties not touched
          ansible.builtin.assert:
            that:
              - _edge_partial_verify.result.description == 'Full property test site'
              - _edge_partial_verify.result.inter_site == true
              - _edge_partial_verify.result.intra_site == true

    # =====================================================================
    #  11. DOMAIN_SERVER parameter
    # =====================================================================
    - name: Get DC FQDN for domain_server tests
      ansible.windows.win_powershell:
        script: |
          $dc = Get-ADDomainController
          $Ansible.Result = $dc.HostName
      register: _dc_info

    - name: Set DC FQDN fact
      ansible.builtin.set_fact:
        test_dc_fqdn: "{{ _dc_info.result }}"

    - name: "DS-1: Create site targeting specific DC"
      microsoft.ad.site:
        name: TestDomainServerSite
        description: Created via domain_server
        domain_server: "{{ test_dc_fqdn }}"
        state: present
      register: _ds_create

    - name: Assert created via domain_server
      ansible.builtin.assert:
        that:
          - _ds_create is changed
          - _ds_create.distinguished_name is defined

    - name: "DS-2: Idempotency with domain_server"
      microsoft.ad.site:
        name: TestDomainServerSite
        description: Created via domain_server
        domain_server: "{{ test_dc_fqdn }}"
        state: present
      register: _ds_create_idem

    - name: Assert no change
      ansible.builtin.assert:
        that:
          - _ds_create_idem is not changed

    - name: "DS-3: Update via domain_server"
      microsoft.ad.site:
        name: TestDomainServerSite
        description: Updated via domain_server
        domain_server: "{{ test_dc_fqdn }}"
        state: present
      register: _ds_update

    - name: Assert updated
      ansible.builtin.assert:
        that:
          - _ds_update is changed

    - name: "DS-4: Remove via domain_server"
      microsoft.ad.site:
        name: TestDomainServerSite
        domain_server: "{{ test_dc_fqdn }}"
        state: absent
      register: _ds_remove

    - name: Assert removed
      ansible.builtin.assert:
        that:
          - _ds_remove is changed

    - name: "DS-5: Invalid domain_server (should fail)"
      microsoft.ad.site:
        name: TestBadServerSite
        domain_server: not-a-real-dc.invalid.local
        state: present
      register: _ds_bad
      ignore_errors: true

    - name: Assert invalid domain_server failed
      ansible.builtin.assert:
        that:
          - _ds_bad is failed

    # =====================================================================
    #  SUMMARY
    # =====================================================================
    - name: All tests passed
      ansible.builtin.debug:
        msg: >-
          All site test scenarios passed. Sites created:
          TestMinimalSite, TestDescSite (removed), TestFullSite,
          TestDiffSite (removed), Test-Hyphen-Site, TestRapidSite.
          Run site_cleanup.yml to remove them.
