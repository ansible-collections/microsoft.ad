DOCUMENTATION:
  module: kds_root_key_info
  short_description: Gather information about one or more KDS root keys in a domain.
  description:
    - Gather information about one or more KDS root keys in a domain.
    - You can specify a key ID to return information about a specific key, or gather
      information about all keys.
  options:
    key_id:
      description:
        - The ID of the key that should be queried.
        - If this is not provided, all keys will be returned.
      type: str
      required: false

  notes:
    - This module must be run on a Windows target host.
    - This module requires the Domain Administrator or Enterprise Administrator role to view KDS keys.
  extends_documentation_fragment:
    - ansible.builtin.action_common_attributes
  attributes:
    check_mode:
      support: full
    diff_mode:
      support: none
    platform:
      platforms:
        - windows
  author:
    - Mike Morency (@mikemorency)

EXAMPLES: |
  - name: Gather information about all keys in a domain
    microsoft.ad.kds_root_key_info: {}

  - name: Gather information about a specific key
    microsoft.ad.kds_root_key_info:
      key_id: 11111111-1111-1111-1111-111111111111

RETURN:
  kds_root_keys:
    description: Information about any keys that were found.
    returned: always
    type: list
    elements: dict
    sample:
      - key_id: 12345678-1234-1234-1234-123456789012
        effective_time: "2026-01-01 12:00:00"
