DOCUMENTATION:
  module: kds_root_key
  short_description: Manages a KDS root key in a domain
  version_added: 1.11.0
  description:
    - Ensure that a KDS root key is present or absent, performing changes only when necessary.
  options:
    effective_time_hours:
      description:
        - The number of hours to wait before the key is effective.
        - This is recommended to be set to a value greater than 0, so that the key can be replicated
          to all domain controllers. Using a key before it has been replicated will result in an error.
        - If set to 0, the key will be effective immediately.
      type: int
      default: 10
    key_id:
      description:
        - The ID of the key that should be removed when O(state) is C(absent).
        - The ID of the key that should be matched when O(state) is C(present) and O(match_by) is C(key_id).
          Pay attention that the created key will not have the specified ID, the C(key_id) is used for matching existing keys only.
      type: str
    match_by:
      description:
        - The method used to find key for idempotency check when O(state=present).
        - When V(any), a key will only be created when no key exists.
        - When V(key_id), O(key_id) must be set and will create the key if one with that
          id does not already exist. The newly created key will not have the specified ID.
        - When V(never), the key will always be created.
      type: str
      default: any
      choices: [any, key_id, never]
    state:
      description:
        - Whether to ensure a key is present or absent.
        - Note that Microsoft warns against removing KDS root keys, since it
          can lead to failed services and accounts.
      type: str
      default: present
      choices: [present, absent]

  notes:
    - This module must be run on a Windows target host.
    - This module requires the Domain Administrator or Enterprise Administrator role to manage KDS keys.
  extends_documentation_fragment:
    - ansible.builtin.action_common_attributes
  attributes:
    check_mode:
      support: full
    diff_mode:
      support: none
    platform:
      platforms:
        - windows
  author:
    - Mike Morency (@mikemorency)

EXAMPLES: |
  - name: Create a new KDS root key with an effective time of 10 hours, if one does not already exist
    microsoft.ad.kds_root_key:
      effective_time_hours: 10
      match_by: any

  - name: Create a new KDS root key immediately, even if one already exists
    microsoft.ad.kds_root_key:
      effective_time_hours: 0
      match_by: never

  - name: Create a new KDS root key immediately, if a key with the specified ID does not already exist
    microsoft.ad.kds_root_key:
      effective_time_hours: 0
      match_by: key_id
      key_id: 2ad622aa-39f0-0583-9cd7-cc8fc85bd2f5

  - name: Remove a KDS root key with the specified ID, if it exists
    microsoft.ad.kds_root_key:
      state: absent
      key_id: 2ad622aa-39f0-0583-9cd7-cc8fc85bd2f5

RETURN:
  key_id:
    description: The ID of the newly created or removed KDS root key.
    returned: always
    type: str
    sample: 12345678-1234-1234-1234-123456789012
